<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Solid white background circle shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.15" flood-color="#000000" />
    </filter>
    
    <!-- Primary Gradient -->
    <linearGradient id="tealIndigo" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Dark Indigo for under-wing shadow -->
    <linearGradient id="shadowGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#3730a3" />
    </linearGradient>
  </defs>

  <!-- Solid white circle background -->
  <circle cx="16" cy="16" r="14" fill="#ffffff" filter="url(#shadow)" />

  <!-- Trajectory line -->
  <path d="M 7 25 C 10 25 12 23 13.5 19.5" fill="none" stroke="url(#tealIndigo)" stroke-width="1.75" stroke-linecap="round" />

  <!-- Geometric Paper Airplane -->
  <!-- Left Wing -->
  <path d="M 23 9 L 9 18 L 15 16.5 Z" fill="url(#tealIndigo)" />
  <!-- Under Keel Shadow -->
  <path d="M 15 16.5 L 9 18 L 12.5 19.5 Z" fill="url(#shadowGrad)" />
  <!-- Right Wing -->
  <path d="M 23 9 L 15 16.5 L 18.5 22 Z" fill="#4f46e5" />
</svg>
